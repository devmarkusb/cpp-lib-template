name: continuous integration tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  preset-test:
    uses: devmarkusb/devenv/.github/workflows/preset-test.yml@main
    with:
      matrix_config: >
        [
          {"preset": "gcc-debug", "image": "ghcr.io/bemanproject/infra-containers-gcc:latest"},
          {"preset": "gcc-release", "image": "ghcr.io/bemanproject/infra-containers-gcc:latest"},
          {"preset": "clang-debug", "image": "ghcr.io/bemanproject/infra-containers-clang:latest"},
          {"preset": "clang-release", "image": "ghcr.io/bemanproject/infra-containers-clang:latest"},
          {"preset": "clang-libc++-debug", "image": "ghcr.io/bemanproject/infra-containers-clang:latest"},
          {"preset": "clang-libc++-release", "image": "ghcr.io/bemanproject/infra-containers-clang:latest"},
          {"preset": "appleclang-debug", "runner": "macos-latest"},
          {"preset": "appleclang-release", "runner": "macos-latest"},
          {"preset": "appleclang-maxsan-release", "runner": "macos-latest"},
          {"preset": "msvc-debug", "runner": "windows-latest"},
          {"preset": "msvc-release", "runner": "windows-latest"}
        ]

  preset-test-nix-conan:
    uses: devmarkusb/devenv/.github/workflows/preset-test-nix-conan.yml@main
    with:
      matrix_config: >
        [
          {"preset": "nix-conan-gcc-debug", "runner": "ubuntu-latest", "nix_packages": "cmake ninja pkg-config conan gcc15", "conan_profile": "conan/profiles/linux-gcc-debug"},
          {"preset": "nix-conan-gcc-release", "runner": "ubuntu-latest", "nix_packages": "cmake ninja pkg-config conan gcc15", "conan_profile": "conan/profiles/linux-gcc-release"},
          {"preset": "nix-conan-clang-debug", "runner": "ubuntu-latest", "nix_packages": "cmake ninja pkg-config conan clang_21 llvmPackages_21.compiler-rt-libc", "conan_profile": "conan/profiles/linux-clang-debug"},
          {"preset": "nix-conan-clang-release", "runner": "ubuntu-latest", "nix_packages": "cmake ninja pkg-config conan clang_21 llvmPackages_21.compiler-rt-libc", "conan_profile": "conan/profiles/linux-clang-release"},
          {"preset": "nix-conan-clang-libc++-debug", "runner": "ubuntu-latest", "nix_packages": "cmake ninja pkg-config conan llvmPackages_21.libcxxClang llvmPackages_21.compiler-rt-libc", "conan_profile": "conan/profiles/linux-clang-libcxx-debug"},
          {"preset": "nix-conan-clang-libc++-release", "runner": "ubuntu-latest", "nix_packages": "cmake ninja pkg-config conan llvmPackages_21.libcxxClang llvmPackages_21.compiler-rt-libc", "conan_profile": "conan/profiles/linux-clang-libcxx-release"},
          {"preset": "nix-conan-appleclang-debug", "runner": "macos-latest", "nix_packages": "cmake ninja pkg-config conan", "conan_profile": "conan/profiles/macos-appleclang-debug"},
          {"preset": "nix-conan-appleclang-release", "runner": "macos-latest", "nix_packages": "cmake ninja pkg-config conan", "conan_profile": "conan/profiles/macos-appleclang-release"},
          {"preset": "nix-conan-appleclang-maxsan-release", "runner": "macos-latest", "nix_packages": "cmake ninja pkg-config conan", "conan_profile": "conan/profiles/macos-appleclang-release"}
        ]
      conanfile: conanfile.txt
      conan_output_folder: build/conan

  build-and-test:
    uses: devmarkusb/devenv/.github/workflows/build-and-test.yml@main
    with:
      matrix_config: >
        {
          "gcc": [
            { "versions": ["15"],
              "tests": [
                { "cxxversions": ["c++26"],
                  "tests": [
                    { "stdlibs": ["libstdc++"],
                      "tests": [
                        "Release.Default", "Release.TSan",
                        "Release.MaxSan", "Release.MaxWarn",
                        "Debug.MaxWarn",
                        "Debug.Coverage"
                      ]
                    }
                  ]
                }
              ]
            }
          ],
          "clang": [
            { "versions": ["21"],
              "tests": [
                {"cxxversions": ["c++26"],
                  "tests": [
                    { "stdlibs": ["libstdc++", "libc++"],
                      "tests": [
                        "Release.Default", "Release.TSan",
                        "Release.MaxSan"
                      ]
                    }
                  ]
                }
              ]
            },
            { "versions": ["18"],
              "tests": [
                { "cxxversions": ["c++26", "c++23"],
                  "tests": [{"stdlibs": ["libc++"], "tests": ["Release.Default"]}]
                }
              ]
            }
          ],
          "appleclang": [
            { "versions": ["latest"],
              "tests": [
                { "cxxversions": ["c++26"],
                  "tests": [{ "stdlibs": ["libc++"], "tests": ["Release.MaxSan", "Debug.MaxWarn"]}]
                }
              ]
            }
          ],
          "msvc": [
            { "versions": ["latest"],
              "tests": [
                { "cxxversions": ["c++23"],
                  "tests": [
                    { "stdlibs": ["stl"],
                      "tests": ["Release.MaxSan", "Debug.MaxWarnMsvc"]
                    }
                  ]
                }
              ]
            }
          ]
        }

  install-test:
    uses: devmarkusb/devenv/.github/workflows/install-test.yml@main
    with:
      image: ghcr.io/bemanproject/infra-containers-gcc:latest
      cxx_standard: 26
      namespace: mb
      main_header: cpp-lib-template.hpp
